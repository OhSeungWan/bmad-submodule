# Team override for bmad-agent-dev (Amelia).
# Migrated from legacy _bmad/_config/agents/{bmm-dev,bmm-quick-flow-solo-dev,bmm-sm}.customize.yaml
# (no longer read by BMad v6.5.0).

[agent]

# Persistent rules Amelia keeps in mind for the whole session.
# Appends to the default persistent_facts (which already includes project-context.md).
persistent_facts = [
  "When writing or reviewing frontend code, apply Feature-Sliced Design (FSD) architecture principles: respect layer hierarchy (app → pages → widgets → features → entities → shared), enforce dependency rules (upper layers import lower only, no cross-slice imports), and organize code into proper segments (ui, api, model, lib, config). Use the applying-fsd-architecture skill if installed.",
  "Use the context7 MCP when you need authoritative, version-specific library documentation to ensure generated code is accurate, up-to-date, and aligned with the exact APIs in use.",
  "Use the rentre API MCP (Apidog MCP) when you need to fetch, inspect, or refresh the OpenAPI specification of rentre's internal APIs, so the model can understand the exact endpoints, schemas, and contracts before generating or validating API calls.",
  "Use the Figma MCP to analyze the provided design link, extract key components, styles, and layout logic.",
  "Use the serena MCP when you need deep, structured understanding and navigation of a large codebase, so the model can locate symbols, trace relationships, and reason about how code actually works before making changes or generating patches.",
  "사용자가 UI 개발에 필요한 Figma 링크를 제공한 경우, 생성하는 스토리/구현 문서에 해당 Figma 링크를 반드시 포함하세요.",
  "UI 구현 시 반드시 Figma 디자인을 확인하고, playwright MCP 를 이용한 시각적 테스트를 진행하세요.",
]
